<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridStock - Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .login-box h1 {
            text-align: center;
            color: #11998e;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        .login-box .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #11998e;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                padding: 25px;
            }
            
            .login-box h1 {
                font-size: 1.5rem;
            }
            
            .login-box .subtitle {
                font-size: 0.9rem;
                margin-bottom: 20px;
            }
            
            .form-group {
                margin-bottom: 15px;
            }
            
            .form-group label {
                font-size: 0.9rem;
            }
            
            .form-group input, .form-group select {
                padding: 10px;
                font-size: 0.95rem;
            }
            
            .btn {
                padding: 12px;
                font-size: 0.95rem;
            }
            
            .toggle-form {
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 360px) {
            .login-box {
                padding: 20px;
                border-radius: 10px;
            }
            
            .login-box h1 {
                font-size: 1.3rem;
            }
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .toggle-form {
            text-align: center;
            margin-top: 20px;
        }
        
        .toggle-form a {
            color: #11998e;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>📦 GridStock</h1>
            <p class="subtitle">Sistema de Gestión de Inventarios</p>
            
            <div id="alert" class="alert"></div>
            
            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn">Iniciar Sesión</button>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label for="reg-username">Nuevo Usuario</label>
                    <input type="text" id="reg-username" placeholder="Crea un usuario" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 4 caracteres" required>
                </div>
                <div class="form-group">
                    <label for="reg-rol">Rol</label>
                    <select id="reg-rol">
                        <option value="usuario">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn">Crear Cuenta</button>
                <button type="button" class="btn btn-secondary" onclick="showLogin()">Cancelar</button>
            </form>
            
            <div class="toggle-form">
                <a onclick="showRegister()">¿No tienes cuenta? Regístrate</a>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Check if already logged in
        const token = localStorage.getItem('gridstock_token');
        if (token) {
            window.location.href = 'index.html';
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.querySelector('.toggle-form').innerHTML = '<a onclick="showRegister()">¿No tienes cuenta? Regístrate</a>';
            document.getElementById('alert').style.display = 'none';
        }
        
        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.querySelector('.toggle-form').innerHTML = '<a onclick="showLogin()">¿Ya tienes cuenta? Inicia sesión</a>';
            document.getElementById('alert').style.display = 'none';
        }
        
        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('gridstock_token', data.token);
                    localStorage.setItem('gridstock_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('Error de conexión', 'error');
            }
        });
        
        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const rol = document.getElementById('reg-rol').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, rol })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert(data.message + ' Ahora puedes iniciar sesión.', 'success');
                    setTimeout(showLogin, 1500);
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('Error de conexión', 'error');
            }
        });
    </script>
</body>
</html>
